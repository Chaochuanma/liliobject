<style>
#lili-trust{margin-top:16px;padding-top:14px;border-top:1px solid rgba(0,0,0,.08);font-size:13px;line-height:1.95;color:#6b6b6b;font-family:inherit}
#lili-trust .row{display:flex;gap:10px}
#lili-trust .row .k{color:#9a9a9a;min-width:44px}
#lili-trust .row .v b{color:#2b2b2b;font-weight:700}
</style>
<script>
(function(){
  function note(){
    var d=document.createElement('div');d.id='lili-trust';
    d.innerHTML='<div class="row"><span class="k">出貨</span><span class="v"><b>收到訂金後 7 天內到貨</b></span></div>'+
                '<div class="row"><span class="k">運費</span><span class="v"><b>免運</b>（偏遠地區除外）</span></div>';
    return d;
  }
  function place(){
    if(document.getElementById('lili-trust'))return;
    var est=[].slice.call(document.querySelectorAll('*')).find(function(e){
      return e.children.length===0 && e.textContent.trim()==='費用試算';});
    var card=est?est.closest('.p-6'):null;
    if(card)card.appendChild(note());
  }
  function boot(){place();new MutationObserver(function(){
    if(!document.getElementById('lili-trust'))place();
  }).observe(document.body,{childList:true,subtree:true});}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,300);});
  else setTimeout(boot,300);
})();
</script>


<script>
/* LILI 表單模式:只留「購買方案 + 費用試算 + 訂購表單」,隱藏首頁大標與產品規格行銷區 */
(function(){
  function hideMarketing(){
    var secs=document.querySelectorAll('section');
    secs.forEach(function(s){
      var t=(s.innerText||'').replace(/\s+/g,'');
      var isHero=/小體積/.test(t)&&/結構誠實/.test(t);
      var isSpecs=/產品規格/.test(t);
      var isEmpty=t.length===0;            /* 頂部裝飾跑馬燈 */
      var keep=/購買方案|費用試算|總計含稅|聯絡人姓名/.test(t);
      if(!keep && (isHero||isSpecs||isEmpty)){ s.style.display='none'; }
    });
  }
  function boot(){
    hideMarketing();
    new MutationObserver(function(){hideMarketing();}).observe(document.body,{childList:true,subtree:true});
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,250);});
  else setTimeout(boot,250);
})();
</script>
